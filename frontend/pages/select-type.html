<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원 유형 선택 - VC route</title>
    <link rel="icon" type="image/svg+xml" href="../image/vc-logo.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Noto Sans KR', sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #eff6ff 0%, #f0fdf4 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .container {
        background: white;
        border-radius: 28px;
        padding: 3rem 2.5rem;
        max-width: 560px;
        width: 100%;
        box-shadow: 0 8px 40px rgba(0,0,0,0.1);
        text-align: center;
      }
      .logo { font-size: 1.5rem; font-weight: 900; color: #2563eb; margin-bottom: 2rem; }
      h1 { font-size: 1.5rem; font-weight: 900; color: #1e293b; margin-bottom: 0.6rem; }
      .subtitle { font-size: 0.95rem; color: #64748b; margin-bottom: 2.5rem; line-height: 1.6; }
      .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
      .type-card {
        border: 2px solid #e2e8f0;
        border-radius: 20px;
        padding: 2rem 1.25rem;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.85rem;
      }
      .type-card:hover { border-color: #2563eb; box-shadow: 0 4px 20px rgba(37,99,235,0.12); transform: translateY(-2px); }
      .type-card.selected { border-color: #2563eb; background: #eff6ff; }
      .type-icon {
        width: 64px; height: 64px; border-radius: 18px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.8rem;
      }
      .type-card.startup .type-icon { background: linear-gradient(135deg, #dbeafe, #bfdbfe); color: #2563eb; }
      .type-card.investor .type-icon { background: linear-gradient(135deg, #dcfce7, #bbf7d0); color: #16a34a; }
      .type-name { font-size: 1.05rem; font-weight: 800; color: #1e293b; }
      .type-desc { font-size: 0.82rem; color: #64748b; line-height: 1.5; }
      .confirm-btn {
        width: 100%; padding: 0.95rem;
        background: #2563eb; color: white;
        border: none; border-radius: 14px;
        font-size: 1rem; font-weight: 700;
        cursor: pointer; transition: background 0.2s;
        display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      }
      .confirm-btn:hover { background: #1d4ed8; }
      .confirm-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
      .spinner {
        width: 20px; height: 20px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: none;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .error-msg { color: #dc2626; font-size: 0.88rem; margin-top: 0.75rem; display: none; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">VC route</div>
      <h1>어떤 유형으로 이용하시나요?</h1>
      <p class="subtitle">투자 유치를 원하는 스타트업인지,<br>딜을 발굴하는 투자자인지 선택해주세요.</p>

      <div class="type-grid">
        <div class="type-card startup" onclick="selectType('startup')">
          <div class="type-icon"><i class="fa-solid fa-rocket"></i></div>
          <div class="type-name">스타트업</div>
          <div class="type-desc">투자 유치를 원하는<br>창업자 / 스타트업 팀</div>
        </div>
        <div class="type-card investor" onclick="selectType('investor')">
          <div class="type-icon"><i class="fa-solid fa-chart-line"></i></div>
          <div class="type-name">투자자</div>
          <div class="type-desc">딜을 발굴하는<br>VC / AC / 엔젤 투자자</div>
        </div>
      </div>

      <button class="confirm-btn" id="confirmBtn" onclick="confirm()" disabled>
        <div class="spinner" id="spinner"></div>
        <span id="confirmText">유형을 선택해주세요</span>
      </button>
      <p class="error-msg" id="errorMsg"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script>
      let selectedType = null;
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // 세션 확인 — 없으면 로그인 페이지로
      (async () => {
        const { data } = await sb.auth.getSession();
        if (!data.session) {
          window.location.href = "login.html";
        }
      })();

      function selectType(type) {
        selectedType = type;
        document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
        document.querySelector('.type-card.' + type).classList.add('selected');
        const btn = document.getElementById('confirmBtn');
        btn.disabled = false;
        document.getElementById('confirmText').textContent =
          (type === 'startup' ? '스타트업' : '투자자') + '으로 시작하기 →';
      }

      async function confirm() {
        if (!selectedType) return;
        const btn = document.getElementById('confirmBtn');
        btn.disabled = true;
        document.getElementById('spinner').style.display = 'block';
        document.getElementById('confirmText').textContent = '저장 중...';

        try {
          // Supabase 메타데이터 업데이트
          const { error } = await sb.auth.updateUser({
            data: { userType: selectedType }
          });
          if (error) throw error;

          // localStorage 업데이트
          const userInfo = JSON.parse(localStorage.getItem('user_info') || '{}');
          userInfo.userType = selectedType;
          localStorage.setItem('user_info', JSON.stringify(userInfo));

          window.location.href = '../pages/register.html?social=true&type=' + selectedType;
        } catch (err) {
          btn.disabled = false;
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('confirmText').textContent = '다시 시도하기';
          const errEl = document.getElementById('errorMsg');
          errEl.textContent = '오류가 발생했습니다: ' + err.message;
          errEl.style.display = 'block';
        }
      }
    </script>
  </body>
</html>
