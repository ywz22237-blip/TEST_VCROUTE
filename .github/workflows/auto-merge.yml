name: Auto Merge Claude Branch to Main

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR and Merge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');

            // main과 diff 확인 (변경사항 없으면 스킵)
            const { data: compare } = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: 'main',
              head: branch
            });

            if (compare.ahead_by === 0) {
              console.log('변경사항 없음, 스킵');
              return;
            }

            // PR mergeable 여부 확인 (충돌 시 rebase 후 재시도)
            // 기존 PR 확인 (open + closed 최근 것 포함)
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base: 'main',
              state: 'open'
            });

            let pr;
            if (prs.length === 0) {
              const { data: newPr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Auto: ${branch}`,
                head: branch,
                base: 'main',
                body: 'Claude Code에서 자동 생성된 PR입니다.'
              });
              pr = newPr;
              console.log(`PR 생성: #${pr.number}`);
            } else {
              pr = prs[0];
              console.log(`기존 PR 사용: #${pr.number}`);
            }

            // mergeable 상태 대기 (최대 30초)
            let mergeable = null;
            for (let i = 0; i < 6; i++) {
              const { data: prDetail } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });
              mergeable = prDetail.mergeable;
              if (mergeable !== null) break;
              await new Promise(r => setTimeout(r, 5000));
            }

            if (mergeable === false) {
              console.log('머지 충돌 발생 - checkout rebase로 해결 시도');
              // rebase를 통한 충돌 해결은 Actions에서 별도 step 필요
              // 일단 merge 강제 시도 (GitHub이 자동 rebase)
            }

            // PR 머지 (merge 방식: 히스토리 보존으로 squash 충돌 방지)
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'merge'
              });
              console.log(`PR #${pr.number} 머지 완료 → Vercel 자동 배포 시작`);
            } catch (mergeErr) {
              console.log(`머지 실패: ${mergeErr.message}`);
              core.setFailed(mergeErr.message);
            }
