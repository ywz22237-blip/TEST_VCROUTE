name: Auto Merge Claude Branch to Main

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge to main
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "브랜치: $BRANCH"

          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          # main 최신화
          git fetch origin main
          git checkout main
          git pull origin main

          # 변경사항 확인
          AHEAD=$(git rev-list main..origin/$BRANCH --count)
          echo "main 대비 $AHEAD 커밋 앞섬"

          if [ "$AHEAD" = "0" ]; then
            echo "변경사항 없음, 스킵"
            exit 0
          fi

          # 브랜치를 main에 머지 (충돌 시 브랜치 내용 우선)
          git merge origin/$BRANCH --no-ff -m "Auto merge: $BRANCH" \
            || git merge origin/$BRANCH -X theirs --no-ff -m "Auto merge (theirs): $BRANCH"

          git push origin main
          echo "main 머지 완료 → Vercel 자동 배포 시작"
